name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          mypy src --ignore-missing-imports || true

      - name: Test with pytest
        run: |
          pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      # NEW STEP: Send CI telemetry event to ingestion endpoint
      - name: Send CI telemetry event
        if: success()   # only run if all previous steps passed
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
        run: |
          echo "Sending CI telemetry event to $INGEST_URL/events"

          curl -X POST "$INGEST_URL/events" \
            -H "Content-Type: application/json" \
            --fail \
            -d "{
              \"source\": \"workflow\",
              \"source_id\": \"${GITHUB_RUN_ID}\",
              \"event_type\": \"business_event\",
              \"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
              \"environment\": \"ci\",
              \"system_name\": \"github_actions\",
              \"data\": {
                \"repo\": \"${GITHUB_REPOSITORY}\",
                \"workflow\": \"${GITHUB_WORKFLOW}\",
                \"run_id\": \"${GITHUB_RUN_ID}\",
                \"status\": \"success\"
              }
            }"

          echo "Telemetry event successfully ingested"
